<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCommit</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- ─── Header ─── -->
    <header class="header">
      <div class="logo-row">
        <img src="icons/LeetCommit.png" alt="LeetCommit" class="logo-img" />
        <h1 class="logo-text">LeetCommit</h1>
      </div>
    </header>

    <!-- ─── Status Banner ─── -->
    <div id="statusBanner" class="status-banner hidden">
      <span id="statusIcon" class="status-icon"></span>
      <span id="statusText" class="status-text"></span>
    </div>

    <!-- ─── Push Button ─── -->
    <button type="button" id="pushBtn" class="push-btn">
      <svg class="push-btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
      <span id="pushBtnText" class="push-btn-text">Push to GitHub</span>
      <span id="pushBtnLoader" class="push-btn-loader hidden">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </span>
    </button>

    <!-- ─── Recent Pushes ─── -->
    <details class="history-details">
      <summary class="history-toggle">
        <svg class="history-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
          <polyline points="3 3 3 8 8 8"></polyline>
          <line x1="12" y1="7" x2="12" y2="12"></line>
          <line x1="12" y1="12" x2="16" y2="14"></line>
        </svg>
        <span>Recent Pushes</span>
      </summary>
      <div id="historyList" class="history-list">
        <div class="history-empty">No pushes yet</div>
      </div>
    </details>

    <!-- ─── Settings (Collapsible) ─── -->
    <details id="settingsDetails" class="settings-details">
      <summary class="settings-toggle">
        <svg class="settings-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span>Settings</span>
      </summary>

      <form id="settingsForm" class="form" autocomplete="off">
        <!-- GitHub PAT -->
        <div class="field">
          <label for="pat">Personal Access Token</label>
          <div class="input-wrap">
            <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" spellcheck="false" required />
            <button type="button" id="togglePat" class="eye-btn" aria-label="Toggle token visibility">
              <svg id="eyeOpen" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeClosed" class="eye-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <!-- Username -->
        <div class="field">
          <label for="username">GitHub Username</label>
          <input type="text" id="username" placeholder="octocat" spellcheck="false" required />
        </div>

        <!-- Repo -->
        <div class="field">
          <label for="repo">Repository Name</label>
          <input type="text" id="repo" placeholder="leetcode-solutions" spellcheck="false" required />
        </div>

        <!-- Branch -->
        <div class="field">
          <label for="branch">Branch <span class="field-hint">(optional, default: main)</span></label>
          <input type="text" id="branch" placeholder="main" spellcheck="false" />
        </div>

        <!-- Commit Prefix -->
        <div class="field">
          <label for="commitPrefix">Commit Prefix <span class="field-hint">(optional)</span></label>
          <input type="text" id="commitPrefix" placeholder="[LC]" spellcheck="false" />
        </div>

        <!-- Save Button -->
        <button type="submit" id="saveBtn" class="save-btn">
          <span class="save-btn-text">Save</span>
          <span class="save-btn-loader hidden">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </span>
        </button>
      </form>
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
